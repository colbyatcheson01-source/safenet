<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SafeNet Reporter Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; color: #1a1a2e; background: #f8f9fc; padding: 24px; max-width: 500px; margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 20px; color: #e94560; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
    .form-group input {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 6px;
      font-size: 14px; background: #fff;
    }
    .form-group .hint { font-size: 12px; color: #888; margin-top: 3px; }
    .btn {
      padding: 10px 24px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: #e94560; color: #fff;
    }
    .btn:hover { background: #d63850; }
    .status { margin-top: 12px; padding: 8px 12px; border-radius: 6px; font-size: 13px; display: none; }
    .status.success { display: block; background: #d1fae5; color: #065f46; }
    .test-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    .test-result { margin-top: 8px; font-size: 13px; }
    .test-result.ok { color: #065f46; }
    .test-result.fail { color: #991b1b; }
  </style>
</head>
<body>
  <h1>🛡️ SafeNet Reporter Settings</h1>
  <div class="form-group">
    <label>SafeNet Server URL</label>
    <input type="url" id="serverUrl" placeholder="http://127.0.0.1:5000">
    <div class="hint">Your SafeNet instance URL. Use the Railway URL if connecting to a remote server.</div>
  </div>
  <div class="form-group">
    <label>API Key (optional)</label>
    <input type="text" id="apiKey" placeholder="sn_...">
    <div class="hint">Get your API key from SafeNet → Settings → API Keys. Leave blank for session-based auth.</div>
  </div>
  <button class="btn" id="saveBtn">Save</button>
  <div id="status" class="status"></div>
  <div class="test-section">
    <button class="btn" id="testBtn" style="background:#0f3460;">Test Connection</button>
    <div id="testResult" class="test-result"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
